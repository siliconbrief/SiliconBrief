<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Silicon Brief links, inquiries, projects, and socials.">
    <title>Silicon Brief</title>
    <link rel="icon" type="image/png" href="Profile.png">
    <link rel="apple-touch-icon" href="Profile.png">
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="profile" aria-labelledby="profile-title">
        <div class="avatar-slot" data-avatar-placeholder role="img" aria-label="Silicon Brief logo">
          <span>SB</span>
        </div>
        <h1 id="profile-title">Silicon Brief</h1>
        <nav class="socials" aria-label="Social links" data-socials></nav>
      </section>

      <section class="links" aria-label="Featured links" data-links></section>
    </main>

    <div class="status-toast" role="status" aria-live="polite" data-toast>Link copied</div>

    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script src="/_vercel/insights/script.js" defer></script>
    <script src="/_vercel/speed-insights/script.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
